name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_USERNAME: admin
      PACT_BROKER_PASSWORD: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start Pact Broker
        run: |
          docker run -d \
            --name pact-broker \
            --network host \
            -e PACT_BROKER_DATABASE_URL=postgresql://pact:pact@localhost/pact \
            -e PACT_BROKER_BASIC_AUTH_USERNAME=admin \
            -e PACT_BROKER_BASIC_AUTH_PASSWORD=admin \
            -e PACT_BROKER_PUBLIC_HEARTBEAT=true \
            pactfoundation/pact-broker
          echo "Waiting for Pact Broker..."
          for i in {1..30}; do
            curl -sf http://localhost:9292/diagnostic/status/heartbeat && echo "Broker ready" && break
            sleep 3
          done

      - name: Install dependencies
        run: npm ci

      - name: Run consumer tests (generates pact file)
        run: npm run test:consumer

      - name: Publish pacts to broker
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for pact_file in pacts/*.json; do
            consumer=$(node -p "require('./$pact_file').consumer.name")
            provider=$(node -p "require('./$pact_file').provider.name")
            echo "Publishing $consumer → $provider @ $VERSION"
            curl -sf -X PUT \
              -H "Content-Type: application/json" \
              -u admin:admin \
              --data-binary "@$pact_file" \
              "http://localhost:9292/pacts/provider/${provider}/consumer/${consumer}/version/${VERSION}"
          done

      - name: Run provider verification (reads from broker)
        run: npm run test:provider
